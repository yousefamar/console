<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0a0a0a" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>Console</title>
    <script>
      window.__earlyErrors=[];
      window.addEventListener('error',function(e){window.__earlyErrors.push({type:'error',message:e.message,filename:e.filename,lineno:e.lineno,colno:e.colno,ts:Date.now()})});
      window.addEventListener('unhandledrejection',function(e){window.__earlyErrors.push({type:'rejection',reason:String(e.reason),ts:Date.now()})});
    </script>
  </head>
  <body>
    <div id="root"></div>
    <!-- react-scan: uncomment for visual render profiling (causes significant overhead with large DOM) -->
    <!-- <script src="https://unpkg.com/react-scan/dist/auto.global.js" crossorigin="anonymous"></script> -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
